name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["spec/**"]
  pull_request:
    paths-ignore: ["spec/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e . pytest pandas
      - run: python -m pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install ruff
      - run: ruff check src tests scripts
      - run: ruff format --check src tests scripts

  # Regenerate golden values with the original CRAN package and make sure
  # the committed fixture still matches upstream.
  r-crosscheck:
    runs-on: ubuntu-latest
    container: rocker/r2u:jammy
    steps:
      - uses: actions/checkout@v4
      - run: Rscript scripts/r_golden.R fresh_golden.json
      - run: |
          Rscript -e '
            fresh <- jsonlite::fromJSON("fresh_golden.json")
            committed <- jsonlite::fromJSON("tests/data/r_golden.json")
            stopifnot(isTRUE(all.equal(fresh, committed, tolerance = 1e-12)))
            cat("committed golden values match the CRAN package\n")'
